name: Release Helm chart

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  CHART_PATH: charts/stacklens-platform
  # Chart is published as OCI artifacts under this path (e.g. oci://ghcr.io/getstacklens-ai/helm/stacklens-platform).
  OCI_REGISTRY: ghcr.io/${{ github.repository_owner }}/helm

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Verify tag matches Chart.yaml version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          ver=$(grep -E '^version:' "${{ env.CHART_PATH }}/Chart.yaml" | awk '{print $2}' | tr -d '"' | tr -d "'")
          if [ "$tag" != "$ver" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match Chart version ${ver} (expected v${ver})"
            exit 1
          fi

      - name: Helm dependency build
        working-directory: ${{ env.CHART_PATH }}
        run: helm dependency build

      - name: Package chart
        run: |
          mkdir -p .cr-release-packages
          helm package "${{ env.CHART_PATH }}" --destination .cr-release-packages

      - name: Log in to GHCR (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Push chart to GHCR
        run: |
          set -euo pipefail
          for pkg in .cr-release-packages/*.tgz; do
            echo "Pushing ${pkg} -> oci://${{ env.OCI_REGISTRY }}"
            helm push "${pkg}" "oci://${{ env.OCI_REGISTRY }}"
          done

      - name: Log out
        if: always()
        run: helm registry logout ghcr.io || true
