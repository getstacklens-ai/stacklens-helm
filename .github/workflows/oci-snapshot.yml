# Publishes a one-off OCI chart version (0.0.0-dev.<sha-prefix>) with images.tag pinned to a platform build.
# Triggered by stacklens-platform on main after images push, or manually via workflow_dispatch.

name: OCI chart snapshot (platform images)

on:
  repository_dispatch:
    types: [stacklens-platform-images]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Git SHA (or tag) for ghcr.io/.../stacklens-* container images"
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  CHART_PATH: charts/stacklens-platform
  OCI_REGISTRY: ghcr.io/${{ github.repository_owner }}/helm

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            tag="${{ github.event.client_payload.image_tag }}"
          else
            tag="${{ github.event.inputs.image_tag }}"
          fi
          if [ -z "$tag" ] || [ "$tag" = "null" ]; then
            echo "::error::client_payload.image_tag / inputs.image_tag is required"
            exit 1
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Snapshot chart version (semver)
        id: ver
        run: |
          sha="${{ steps.meta.outputs.tag }}"
          short=$(printf '%s' "$sha" | cut -c1-12 | tr '[:upper:]' '[:lower:]')
          echo "chart_version=0.0.0-dev.${short}" >> "$GITHUB_OUTPUT"

      - name: Install yq
        env:
          YQ_VERSION: v4.44.3
        run: |
          curl -sSL "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -o /tmp/yq
          sudo install -m755 /tmp/yq /usr/local/bin/yq

      - name: Pin images.tag in packaged values (working tree only)
        run: |
          yq -i '.images.tag = "${{ steps.meta.outputs.tag }}"' "${{ env.CHART_PATH }}/values.yaml"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Helm dependency build
        working-directory: ${{ env.CHART_PATH }}
        run: helm dependency build

      - name: Package chart
        run: |
          mkdir -p .cr-release-packages
          helm package "${{ env.CHART_PATH }}" \
            --destination .cr-release-packages \
            --version "${{ steps.ver.outputs.chart_version }}" \
            --app-version "${{ steps.meta.outputs.tag }}"

      - name: Log in to GHCR (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Push chart to GHCR
        run: |
          set -euo pipefail
          for pkg in .cr-release-packages/*.tgz; do
            echo "Pushing ${pkg} -> oci://${{ env.OCI_REGISTRY }}"
            helm push "${pkg}" "oci://${{ env.OCI_REGISTRY }}"
          done

      - name: Log out
        if: always()
        run: helm registry logout ghcr.io || true
