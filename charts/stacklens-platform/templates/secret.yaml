{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) }}
{{- $identityDb := .Values.secrets.identityDb }}
{{- $flowopsDb := .Values.secrets.flowopsDb }}
{{- $redisConn := .Values.secrets.redis }}
{{- if .Values.postgresql.enabled }}
{{- $pgPass := required "When postgresql.enabled=true, set postgresql.auth.postgresPassword (used for StackLens DB connection strings)" .Values.postgresql.auth.postgresPassword }}
{{- $pgHost := include "stacklens-platform.postgresql.primaryHost" . }}
{{- $identityDb = printf "Host=%s;Port=%d;Database=stacklens_identity;Username=postgres;Password=%s" $pgHost (int .Values.postgresql.connectionPort) $pgPass }}
{{- $flowopsDb = printf "Host=%s;Port=%d;Database=stacklens_flowops;Username=postgres;Password=%s" $pgHost (int .Values.postgresql.connectionPort) $pgPass }}
{{- end }}
{{- if .Values.redis.enabled }}
{{- $rh := include "stacklens-platform.redis.masterHost" . }}
{{- $rp := int .Values.redis.connectionPort }}
{{- if .Values.redis.auth.enabled }}
{{- $pwd := required "When redis.enabled=true and redis.auth.enabled=true, set redis.auth.password" .Values.redis.auth.password }}
{{- $redisConn = printf "%s:%d,password=%s" $rh $rp $pwd }}
{{- else }}
{{- $redisConn = printf "%s:%d" $rh $rp }}
{{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "stacklens-platform.fullname" . }}-credentials
  labels:
    {{- include "stacklens-platform.labels" . | nindent 4 }}
  {{- if .Values.global.namespace }}
  namespace: {{ .Values.global.namespace }}
  {{- end }}
type: Opaque
stringData:
  ConnectionStrings__IdentityDb: {{ $identityDb | quote }}
  ConnectionStrings__FlowOpsDb: {{ $flowopsDb | quote }}
  ConnectionStrings__Redis: {{ $redisConn | quote }}
  Jwt__Secret: {{ .Values.secrets.jwtSecret | quote }}
{{- end }}
