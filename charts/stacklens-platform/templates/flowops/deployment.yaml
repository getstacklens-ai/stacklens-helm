{{- if .Values.flowops.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "stacklens-platform.flowops.name" . }}
  labels:
    {{- include "stacklens-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: flowops
  {{- if .Values.global.namespace }}
  namespace: {{ .Values.global.namespace }}
  {{- end }}
spec:
  replicas: {{ .Values.flowops.replicas }}
  selector:
    matchLabels:
      {{- include "stacklens-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: flowops
  template:
    metadata:
      labels:
        {{- include "stacklens-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: flowops
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: flowops
          image: {{ printf "%s/stacklens-flowops:%s" .Values.images.registry (include "stacklens-platform.images.tag" .) | quote }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: ASPNETCORE_ENVIRONMENT
              value: {{ .Values.flowops.env.ASPNETCORE_ENVIRONMENT | quote }}
            - name: ConnectionStrings__FlowOpsDb
              valueFrom:
                secretKeyRef:
                  name: {{ include "stacklens-platform.secretName" . }}
                  key: ConnectionStrings__FlowOpsDb
            - name: ConnectionStrings__Redis
              valueFrom:
                secretKeyRef:
                  name: {{ include "stacklens-platform.secretName" . }}
                  key: ConnectionStrings__Redis
          resources:
            {{- toYaml .Values.flowops.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
{{- end }}
