{{- if .Values.flowops.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "stacklens-platform.flowops.name" . }}
  labels:
    {{- include "stacklens-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: flowops
  {{- if .Values.global.namespace }}
  namespace: {{ .Values.global.namespace }}
  {{- end }}
spec:
  selector:
    {{- include "stacklens-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: flowops
  ports:
    - port: 80
      targetPort: 8080
{{- end }}
