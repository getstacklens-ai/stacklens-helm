{{- if .Values.ui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "stacklens-platform.ui.name" . }}
  labels:
    {{- include "stacklens-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
  {{- if .Values.global.namespace }}
  namespace: {{ .Values.global.namespace }}
  {{- end }}
spec:
  replicas: {{ .Values.ui.replicas }}
  selector:
    matchLabels:
      {{- include "stacklens-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        {{- include "stacklens-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ui
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ui
          image: {{ printf "%s/stacklens-ui:%s" .Values.images.registry (include "stacklens-platform.images.tag" .) | quote }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          ports:
            - containerPort: 80
          env:
            - name: GATEWAY_HOST
              value: {{ include "stacklens-platform.gateway.name" . }}
          volumeMounts:
            - name: nginx-templates
              mountPath: /etc/nginx/templates/default.conf.template
              subPath: default.conf.template
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: nginx-templates
          configMap:
            name: {{ include "stacklens-platform.ui.name" . }}-nginx
{{- end }}
